<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HireNest — CV Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="navbar">
    <div class="logo">HireNest</div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goToResume()">Resume Generator</button>
      <button class="nav-btn active" onclick="goToCV()">CV Generator</button>
      <button class="nav-btn" onclick="goToJobs()">Job Finder</button>
      <button class="nav-btn" onclick="goToCoverLetter()">Cover Letter</button>
    </div>
  </div>
  <main style="max-width:1180px; margin:0 auto; padding:72px 24px 80px;">
    <section class="section-heading" style="margin-bottom:32px; text-align:left;">
      <h2>CV Generator</h2>
      <p>Compose a clean, recruiter-ready CV in a premium, modern layout.</p>
    </section>
    <div style="display:grid; grid-template-columns: 1.1fr 0.9fr; gap:24px;">
      <section class="section-block">
        <div class="form-header" style="margin-bottom:22px;">
          <div class="fh-step">Enter details</div>
          <h3 class="fh-title" style="font-size:28px; margin-top:12px;">Build your professional CV.</h3>
        </div>
        <div class="field"><label for="name">Full Name</label><input id="name" type="text" placeholder="Full Name"></div>
        <div class="field"><label for="role">Role</label><input id="role" type="text" placeholder="Product Designer"></div>
        <div class="field"><label for="summary">Summary</label><textarea id="summary" placeholder="Brief profile summary"></textarea></div>
        <div class="field"><label for="education">Education</label><textarea id="education" placeholder="Education details"></textarea></div>
        <div class="field"><label for="experience">Experience</label><textarea id="experience" placeholder="Experience details"></textarea></div>
        <div class="field"><label for="skills">Skills</label><textarea id="skills" placeholder="Skills, tools, and languages"></textarea></div>
        <div class="form-actions" style="padding-top:16px;">
          <button class="btn btn-primary" onclick="generateCV()">Generate CV</button>
          <button class="btn btn-secondary" onclick="downloadCV()">Download</button>
        </div>
      </section>
      <section class="section-block">
        <h3 style="margin-bottom:18px;">Preview</h3>
        <div id="cv-result" class="empty-state" style="min-height: 520px; color: var(--ink); line-height:1.75;">Your CV preview will appear here.</div>
      </section>
    </div>
  </main>
  <script>
    function generateCV() {
      const name = document.getElementById("name").value.trim();
      const role = document.getElementById("role").value.trim();
      const summary = document.getElementById("summary").value.trim();
      const education = document.getElementById("education").value.trim();
      const experience = document.getElementById("experience").value.trim();
      const skills = document.getElementById("skills").value.trim();
      const formatText = text => text.replace(/\n/g, "<br>") || "—";
      const cvHTML = `
        <article class="cv-export">
          <header class="cv-header">
            <h1>${name || 'Your Name'}</h1>
            <p class="subtitle">${role || 'Your Title or Role'}</p>
          </header>
          <section class="cv-section">
            <h3>Summary</h3>
            <p>${formatText(summary)}</p>
          </section>
          <section class="cv-section">
            <h3>Education</h3>
            <p>${formatText(education)}</p>
          </section>
          <section class="cv-section">
            <h3>Experience</h3>
            <p>${formatText(experience)}</p>
          </section>
          <section class="cv-section">
            <h3>Skills</h3>
            <p>${formatText(skills)}</p>
          </section>
        </article>
      `;
      const result = document.getElementById("cv-result");
      result.classList.remove("empty-state");
      result.innerHTML = cvHTML;
    }

    function downloadCV() {
      const result = document.getElementById("cv-result");
      if (!result.innerHTML.trim() || result.classList.contains("empty-state")) {
        alert("Please generate your CV preview before downloading.");
        return;
      }
      const printWindow = window.open("", "_blank");
      const styles = `
        <style>
          @page {
            size: A4 portrait;
            margin: 14mm;
          }

          body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #20242f;
            background: #fff;
          }

          .cv-export {
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            padding: 0;
            border: none;
            box-shadow: none;
            page-break-inside: avoid;
            break-inside: avoid;
          }

          .cv-header h1 {
            margin: 0 0 10px;
            font-size: 30px;
          }

          .cv-header .subtitle {
            margin: 0 0 20px;
            color: #47526a;
            font-size: 0.98rem;
          }

          .cv-section {
            margin-bottom: 18px;
            page-break-inside: avoid;
            break-inside: avoid;
          }

          .cv-section h3 {
            margin: 0 0 10px;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #2f56ff;
          }

          .cv-section p {
            margin: 0;
            color: #47526a;
            white-space: pre-wrap;
            line-height: 1.6;
            font-size: 0.95rem;
          }

          .divider {
            border: none;
            height: 1px;
            margin: 24px 0;
            background: rgba(47, 86, 255, 0.12);
          }
        </style>
      `;
      printWindow.document.write(`<!DOCTYPE html><html><head><title>CV Download</title>${styles}</head><body>${result.innerHTML}</body></html>`);
      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
      printWindow.close();
    }
    function navigateTo(url) {
      document.body.classList.add('page-transitioning');
      window.setTimeout(() => { window.location.href = url; }, 260);
    }
    function goToResume() { navigateTo("index.html"); }
    function goToJobs() { navigateTo("jobs.html"); }
    function goToCoverLetter() { navigateTo("coverletter.html"); }
    function goToCV() { navigateTo("cv.html"); }
    document.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('page-loaded');
    });
  </script>
</body>
</html>
