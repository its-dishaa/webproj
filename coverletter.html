
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cover Letter Generator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f7fb;
      min-height: 100vh;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1a1a1a;
      color: white;
      padding: 14px 24px;
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      color: #4CAF50;
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
    }

    .nav-btn {
      background: transparent;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .nav-btn:hover {
      background: #333;
    }

    .nav-btn.active {
      background: #4CAF50;
    }

    /* Main Layout */
    .container {
      max-width: 1200px;
      margin: 30px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      color: #222;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-top: 14px;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn-group {
      display: flex;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .generate-btn,
    .download-btn,
    .copy-btn {
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    .generate-btn {
      background: #4CAF50;
      color: white;
    }

    .download-btn {
      background: #007bff;
      color: white;
    }

    .copy-btn {
      background: #222;
      color: white;
    }

    .generate-btn:hover,
    .download-btn:hover,
    .copy-btn:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    #preview {
      white-space: pre-wrap;
      line-height: 1.8;
      color: #222;
    }

    .empty-state {
      color: #777;
      text-align: center;
      margin-top: 100px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .nav-buttons {
        flex-wrap: wrap;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <div class="navbar">
    <div class="logo">PetalResume</div>

    <div class="nav-buttons">
      <button class="nav-btn" onclick="goToResume()">Resume Generator</button>
      <button class="nav-btn" onclick="goToCV()">CV Generator</button>
      <button class="nav-btn" onclick="goToJobs()">Job Finder</button>
      <button class="nav-btn active" onclick="goToCoverLetter()">Cover Letter</button>
    </div>
  </div>

  <div style="padding:30px 20px 0;">
    <h1>Cover Letter Generator</h1>
    <p class="subtitle">Create a personalized cover letter for any role instantly</p>
  </div>

  <div class="container">

    <!-- Input Section -->
    <div class="card">
      <label>Your Name</label>
      <input type="text" id="name" placeholder="Enter your name">

      <label>Job Role</label>
      <input type="text" id="role" placeholder="Frontend Developer">

      <label>Company Name</label>
      <input type="text" id="company" placeholder="Google">

      <label>Your Skills</label>
      <textarea id="skills" placeholder="HTML, CSS, JavaScript, React"></textarea>

      <label>Your Experience / Projects</label>
      <textarea id="experience" placeholder="Built responsive websites and worked on projects..."></textarea>

      <label>Cover Letter Tone</label>
      <select id="tone">
        <option value="professional">Professional</option>
        <option value="friendly">Friendly</option>
        <option value="confident">Confident</option>
      </select>

      <div class="btn-group">
        <button class="generate-btn" onclick="generateLetter()">Generate Cover Letter</button>
        <button class="copy-btn" onclick="copyLetter()">Copy</button>
        <button class="download-btn" onclick="downloadLetter()">Download</button>
      </div>
    </div>

    <!-- Preview Section -->
    <div class="card">
      <h2 style="margin-bottom:15px;">Preview</h2>
      <div id="preview" class="empty-state">
        Your generated cover letter will appear here.
      </div>
    </div>

  </div>

  <script>
    function generateLetter() {
      const name = document.getElementById('name').value.trim();
      const role = document.getElementById('role').value.trim();
      const company = document.getElementById('company').value.trim();
      const skills = document.getElementById('skills').value.trim();
      const experience = document.getElementById('experience').value.trim();
      const tone = document.getElementById('tone').value;

      if (!name || !role || !company) {
        alert('Please fill name, role and company');
        return;
      }

      let intro = "";
      let ending = "";

      if (tone === 'professional') {
        intro = `Dear Hiring Manager,\n\nI am writing to express my interest in the ${role} position at ${company}.`;
        ending = `Thank you for your time and consideration. I would welcome the opportunity to discuss how I can contribute to ${company}.\n\nSincerely,\n${name}`;
      }

      if (tone === 'friendly') {
        intro = `Hello,\n\nI was excited to see the opening for ${role} at ${company}.`;
        ending = `Thank you for considering my application. I would love the opportunity to contribute to your team.\n\nBest regards,\n${name}`;
      }

      if (tone === 'confident') {
        intro = `Dear Hiring Team,\n\nI am confident that my background makes me a strong fit for the ${role} role at ${company}.`;
        ending = `I am eager to bring my skills and dedication to ${company}. I look forward to hearing from you soon.\n\nRegards,\n${name}`;
      }

      const letter = `${intro}\n\nWith skills in ${skills}, I have developed strong abilities that align closely with this opportunity. ${experience}\n\nI am particularly interested in ${company} because of its innovation and growth opportunities. I believe I can make a valuable contribution while continuing to learn and grow professionally.\n\n${ending}`;

      document.getElementById('preview').classList.remove('empty-state');
      document.getElementById('preview').innerText = letter;
    }

    function copyLetter() {
      const text = document.getElementById('preview').innerText;

      if (text.includes('Your generated cover letter')) {
        alert('Generate a cover letter first');
        return;
      }

      navigator.clipboard.writeText(text);
      alert('Cover letter copied!');
    }

    function downloadLetter() {
      const text = document.getElementById('preview').innerText;

      if (text.includes('Your generated cover letter')) {
        alert('Generate a cover letter first');
        return;
      }

      const blob = new Blob([text], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'cover-letter.txt';
      link.click();
    }

    // Navbar Routing
    function goToResume() {
      window.location.href = 'index.html';
    }

    function goToCV() {
      window.location.href = 'cv.html';
    }

    function goToJobs() {
      window.location.href = 'jobs.html';
    }

    function goToCoverLetter() {
      window.location.href = 'coverletter.html';
    }

    // Auto-fill role from job page or resume page
    window.onload = function () {
      const savedRole = localStorage.getItem('jobRole');
      if (savedRole) {
        document.getElementById('role').value = savedRole;
      }
    }
  </script>
</body>
</html>

<button class="nav-btn" onclick="goToCoverLetter()">Cover Letter</button>
