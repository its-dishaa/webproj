<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HireNest — Cover Letter Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="navbar">
    <div class="logo">HireNest</div>
    <div class="nav-buttons">
      <button class="nav-btn" onclick="goToResume()">Resume Generator</button>
      <button class="nav-btn" onclick="goToCV()">CV Generator</button>
      <button class="nav-btn" onclick="goToJobs()">Job Finder</button>
      <button class="nav-btn active" onclick="goToCoverLetter()">Cover Letter</button>
    </div>
  </div>
  <main style="max-width:1160px; margin:0 auto; padding:72px 24px 80px;">
    <section class="section-heading" style="margin-bottom:32px; text-align:left;">
      <h2>Cover Letter Generator</h2>
      <p>Write a polished, tailored introduction for every application.</p>
    </section>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:24px;">
      <section class="section-block">
        <div class="form-header" style="margin-bottom:24px;">
          <div class="fh-step">Compose your message</div>
          <h3 class="fh-title" style="font-size:28px; margin-top:12px;">Build a strong opening paragraph.</h3>
        </div>
        <div class="field"><label for="name">Your Name</label><input id="name" type="text" placeholder="Enter your name"></div>
        <div class="field"><label for="role">Job Role</label><input id="role" type="text" placeholder="Frontend Developer"></div>
        <div class="field"><label for="company">Company Name</label><input id="company" type="text" placeholder="Google"></div>
        <div class="field"><label for="skills">Skills</label><textarea id="skills" placeholder="HTML, CSS, JavaScript, React"></textarea></div>
        <div class="field"><label for="experience">Experience / Projects</label><textarea id="experience" placeholder="Built responsive websites and projects..."></textarea></div>
        <div class="field"><label for="tone">Tone</label><select id="tone"><option value="professional">Professional</option><option value="friendly">Friendly</option><option value="confident">Confident</option></select></div>
        <div class="form-actions" style="padding-top:16px;">
          <button class="btn btn-primary" onclick="generateLetter()">Generate</button>
          <button class="btn btn-secondary" onclick="copyLetter()">Copy</button>
          <button class="btn btn-secondary" onclick="downloadLetter()">Download</button>
        </div>
      </section>
      <section class="section-block">
        <h3 style="margin-bottom:18px;">Preview</h3>
        <div id="preview" class="empty-state" style="min-height: 440px; white-space: pre-wrap; line-height:1.75; color: var(--ink);">Your generated cover letter will appear here.</div>
      </section>
    </div>
  </main>
  <script>
    function generateLetter() {
      const name = document.getElementById('name').value.trim();
      const role = document.getElementById('role').value.trim();
      const company = document.getElementById('company').value.trim();
      const skills = document.getElementById('skills').value.trim();
      const experience = document.getElementById('experience').value.trim();
      const tone = document.getElementById('tone').value;
      if (!name || !role || !company) {
        alert('Please fill name, role and company');
        return;
      }
      let intro = "";
      let ending = "";
      if (tone === 'professional') {
        intro = `Dear Hiring Manager,

I am writing to express my interest in the ${role} position at ${company}.`;
        ending = `Thank you for your time and consideration. I would welcome the opportunity to discuss how I can contribute to ${company}.

Sincerely,
${name}`;
      }
      if (tone === 'friendly') {
        intro = `Hello,

I was excited to see the opening for ${role} at ${company}.`;
        ending = `Thank you for considering my application. I would love the opportunity to contribute to your team.

Best regards,
${name}`;
      }
      if (tone === 'confident') {
        intro = `Dear Hiring Team,

I am confident that my background makes me a strong fit for the ${role} role at ${company}.`;
        ending = `I am eager to bring my skills and dedication to ${company}. I look forward to hearing from you soon.

Regards,
${name}`;
      }
      const letter = `${intro}

With skills in ${skills}, I have developed strong abilities that align closely with this opportunity. ${experience}

I am particularly interested in ${company} because of its innovation and growth opportunities. I believe I can make a valuable contribution while continuing to learn and grow professionally.

${ending}`;
      const preview = document.getElementById('preview');
      preview.classList.remove('empty-state');
      preview.innerText = letter;
    }
    function copyLetter() {
      const text = document.getElementById('preview').innerText;
      if (text.includes('Your generated cover letter')) {
        alert('Generate a cover letter first');
        return;
      }
      navigator.clipboard.writeText(text);
      alert('Cover letter copied!');
    }
    function downloadLetter() {
      const text = document.getElementById('preview').innerText;
      if (text.includes('Your generated cover letter')) {
        alert('Generate a cover letter first');
        return;
      }
      const blob = new Blob([text], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'cover-letter.txt';
      link.click();
    }
    function navigateTo(url) {
      document.body.classList.add('page-transitioning');
      window.setTimeout(() => { window.location.href = url; }, 260);
    }
    function goToResume() { navigateTo('index.html'); }
    function goToCV() { navigateTo('cv.html'); }
    function goToJobs() { navigateTo('jobs.html'); }
    function goToCoverLetter() { navigateTo('coverletter.html'); }
    window.onload = function () {
      document.body.classList.add('page-loaded');
      const savedRole = localStorage.getItem('jobRole');
      if (savedRole) {
        document.getElementById('role').value = savedRole;
      }
    }
  </script>
</body>
</html>
