<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireNest — Job Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="navbar">
  <div class="logo">HireNest</div>
  <div class="nav-buttons">
    <button class="nav-btn" onclick="goToResume()">Resume Generator</button>
    <button class="nav-btn" onclick="goToCV()">CV Generator</button>
    <button class="nav-btn active" onclick="goToJobs()">Job Finder</button>
    <button class="nav-btn" onclick="goToCoverLetter()">Cover Letter</button>
  </div>
</div>
<main class="jobs-shell">
  <section class="hero-shell">
    <div class="section-heading">
      <h2>Find roles that match your next chapter.</h2>
      <p>Search curated job listings with a calm, focused interface, and keep momentum with resume-ready tips and filters.</p>
    </div>
    <div class="job-hero-grid">
      <div class="search-card">
        <h3>Search jobs</h3>
        <label for="roleInput">Role, company, or skill</label>
        <div class="search-box">
          <input id="roleInput" type="text" placeholder="Product Designer, Data Analyst, Frontend Developer">
          <button class="btn btn-primary" onclick="searchJobs()">Search</button>
        </div>
      </div>
    </div>
  </section>

  <section class="jobs-panel">
    <div class="filter-bar">
      <span>Filter by</span>
      <button type="button" class="chip active" data-filter="All" onclick="setFilter('All')">All</button>
      <button type="button" class="chip" data-filter="Tech" onclick="setFilter('Tech')">Tech</button>
      <button type="button" class="chip" data-filter="Product" onclick="setFilter('Product')">Product</button>
      <button type="button" class="chip" data-filter="Marketing" onclick="setFilter('Marketing')">Marketing</button>
      <button type="button" class="chip" data-filter="Remote" onclick="setFilter('Remote')">Remote</button>
    </div>
    <div id="loader" class="loader hidden">Searching for curated roles…</div>
    <div id="jobsContainer" class="job-grid"></div>
  </section>
</main>

<div id="jobModal" class="modal hidden">
  <div class="modal-backdrop" onclick="closeJobModal()"></div>
  <div class="modal-panel">
    <button class="modal-close" type="button" onclick="closeJobModal()">×</button>
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <p id="modalMeta" class="modal-meta"></p>
      <p id="modalDescription" class="modal-description"></p>
      <div class="modal-actions">
        <button type="button" class="btn btn-primary" onclick="applyToJob(activeModalIndex)">Apply now</button>
        <button type="button" class="btn btn-secondary" onclick="closeJobModal()">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const APP_ID = "9c3a952a";
const APP_KEY = "777dc1aeadfa0ea08b6641d265c1ac15";
let activeFilter = 'All';
let lastQuery = '';
let currentJobs = [];
let fetchedJobs = [];
let activeModalIndex = null;
const fallbackJobs = [
  {
    title: 'Product Designer',
    company: 'Apex Labs',
    location: 'Bengaluru, India',
    category: 'Product',
    description: 'Design elegant product experiences, establish visual systems, and collaborate with engineering for launch-ready interfaces.',
    fullDescription: 'Design elegant product experiences, establish visual systems, and collaborate with engineering for launch-ready interfaces with strong user research and polished visuals.',
    url: 'https://example.com/jobs/product-designer'
  },
  {
    title: 'Frontend Developer',
    company: 'Nova Digital',
    location: 'Mumbai, India',
    category: 'Tech',
    description: 'Build responsive web applications, optimize UI performance, and translate designs into polished frontend code.',
    fullDescription: 'Build responsive web applications, optimize UI performance, and translate designs into polished frontend code across React, Vue, or modern JS frameworks.',
    url: 'https://example.com/jobs/frontend-developer'
  },
  {
    title: 'Marketing Specialist',
    company: 'Blue Peak',
    location: 'Delhi, India',
    category: 'Marketing',
    description: 'Lead campaign strategy, write persuasive copy, and help brands expand reach through data-driven marketing.',
    fullDescription: 'Lead campaign strategy, write persuasive copy, and help brands expand reach through data-driven marketing across email, social, and paid channels.',
    url: 'https://example.com/jobs/marketing-specialist'
  },
  {
    title: 'Remote Project Manager',
    company: 'Cloud Bridge',
    location: 'India (Remote)',
    category: 'Remote',
    description: 'Coordinate product launches, manage stakeholders, and keep distributed teams aligned on delivery goals.',
    fullDescription: 'Coordinate product launches, manage stakeholders, and keep distributed teams aligned on delivery goals using remote collaboration tools.',
    url: 'https://example.com/jobs/remote-project-manager'
  },
  {
    title: 'Growth Product Manager',
    company: 'Spark Labs',
    location: 'Hyderabad, India',
    category: 'Product',
    description: 'Drive customer growth initiatives, define experiments, and improve retention through product-led thinking.',
    fullDescription: 'Drive customer growth initiatives, define experiments, and improve retention through product-led thinking and cross-functional collaboration.',
    url: 'https://example.com/jobs/growth-product-manager'
  }
];

function navigateTo(url) {
  document.body.classList.add('page-transitioning');
  window.setTimeout(() => { window.location.href = url; }, 240);
}

function goToJobs() { navigateTo("jobs.html"); }
function goToResume() { navigateTo("index.html"); }
function goToCV() { navigateTo("cv.html"); }
function goToCoverLetter() { navigateTo("coverletter.html"); }

function applyFilters() {
  const term = lastQuery.trim().toLowerCase();
  const filtered = fetchedJobs.filter(job => {
    const loc = (job.location || '').toLowerCase();
    const title = (job.title || '').toLowerCase();
    const desc = (job.description || '').toLowerCase();
    const cat = (job.category || '').toLowerCase();
    const fLower = activeFilter.toLowerCase();

    let matchesFilter = false;
    if (activeFilter === 'All') {
      matchesFilter = true;
    } else if (activeFilter === 'Remote') {
      matchesFilter = loc.includes('remote') || title.includes('remote');
    } else {
      matchesFilter = cat === fLower || title.includes(fLower) || desc.includes(fLower);
    }

    const matchesQuery = !term || title.includes(term) || (job.company || '').toLowerCase().includes(term) || desc.includes(term) || cat.includes(term);
    return matchesFilter && matchesQuery;
  });

  renderJobs(filtered);
}

function renderJobs(jobs) {
  const container = document.getElementById('jobsContainer');
  currentJobs = jobs;
  if (!jobs.length) {
    container.innerHTML = `<div class="job-card"><p>No jobs found for that search.</p></div>`;
    return;
  }
  container.innerHTML = jobs.map((job, index) => `
      <div class="job-card">
        <div class="job-card-header">
          <div>
            <h3>${job.title}</h3>
            <div class="job-meta">
              <span>${job.company}</span>
              <span>${job.location}</span>
            </div>
          </div>
        </div>
        <p>${job.description}</p>
        <div class="job-actions">
          <button type="button" class="apply-btn" onclick="applyToJob(${index})">Apply</button>
          <button type="button" class="view-btn" onclick="viewJobDetails(${index})">View details</button>
        </div>
      </div>
    `).join('');
}

function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-bar .chip').forEach(chip => {
    chip.classList.toggle('active', chip.dataset.filter === filter);
  });
  applyFilters();
}

async function searchJobs() {
  const role = document.getElementById('roleInput').value.trim();
  const container = document.getElementById('jobsContainer');
  const loader = document.getElementById('loader');
  
  lastQuery = role;
  loader.classList.remove('hidden');
  container.innerHTML = '';

  try {
    let url = `https://api.adzuna.com/v1/api/jobs/in/search/1?app_id=${APP_ID}&app_key=${APP_KEY}&results_per_page=50`;
    if (role) {
      url += `&what=${encodeURIComponent(role)}`;
    }
    
    if (activeFilter === 'Remote') {
      url += `&where=Remote`;
    }

    const response = await fetch(url);
    const data = await response.json();
    const results = data && data.results ? data.results : [];
    loader.classList.add('hidden');

    if (results.length === 0) {
      fetchedJobs = fallbackJobs;
    } else {
      fetchedJobs = results.map(job => ({
        title: job.title || 'Role',
        company: job.company?.display_name || 'Company',
        location: job.location?.display_name || 'Location',
        category: job.category?.label || '',
        description: job.description ? job.description.replace(/<[^>]+>/g, '').substring(0, 140) + '…' : 'No description available.',
        fullDescription: job.description ? job.description.replace(/<[^>]+>/g, '') : 'No description available.',
        url: job.redirect_url || '#'
      }));
    }
    applyFilters();
  } catch (error) {
    loader.classList.add('hidden');
    fetchedJobs = fallbackJobs;
    applyFilters();
    console.error(error);
  }
}

window.addEventListener('DOMContentLoaded', () => {
  document.body.classList.add('page-loaded');
  const roleInput = document.getElementById('roleInput');
  roleInput.addEventListener('keydown', event => {
    if (event.key === 'Enter') {
      event.preventDefault();
      searchJobs();
    }
  });

  fetchedJobs = fallbackJobs;
  searchJobs(); // Automatically perform a search to populate job listings
});

function viewJobDetails(index) {
  const job = currentJobs[index];
  if (!job) return;
  activeModalIndex = index;
  document.getElementById('modalTitle').textContent = job.title;
  document.getElementById('modalMeta').textContent = `${job.company} • ${job.location}`;
  document.getElementById('modalDescription').textContent = job.fullDescription || job.description;
  document.getElementById('jobModal').classList.remove('hidden');
}

function applyToJob(index) {
  const job = currentJobs[index];
  if (!job || !job.url) return;
  window.open(job.url, '_blank');
}

function closeJobModal() {
  document.getElementById('jobModal').classList.add('hidden');
  activeModalIndex = null;
}
</script>
</body>
</html>
