<!DOCTYPE html>
<html>
<head>
    <title>Modern Resume Form</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        .container {
            max-width: 700px;
            margin: auto;
            background: white;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        h3 {
            background: #2ca8c2;
            color: white;
            padding: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2ca8c2;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #1f8fa5;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Modern Resume Builder</h2>

    <!-- NAME -->
    <h3>Personal Info</h3>
    <input id="name" placeholder="Full Name">

    <!-- PROFILE -->
    <h3>Profile</h3>
    <textarea id="profile" placeholder="Write your profile summary"></textarea>

    <h3>Profile Photo</h3>
<input type="file" id="photo" accept="image/*">

    <!-- CONTACT -->
    <h3>Contact</h3>
    <input id="phone" placeholder="Phone">
    <input id="email" placeholder="Email">
    <input id="address" placeholder="Address">

    <!-- EXPERIENCE -->
    <h3>Work Experience</h3>
    <input id="jobTitle" placeholder="Job Title">
    <input id="company" placeholder="Company Name">
    <input id="expStart" placeholder="Start Date">
    <input id="expEnd" placeholder="End Date">
    <textarea id="expDesc" placeholder="Describe your work"></textarea>

    <!-- EDUCATION -->
    <h3>Education</h3>
    <input id="degree" placeholder="Degree">
    <input id="college" placeholder="College Name">
    <input id="eduStart" placeholder="Start Date">
    <input id="eduEnd" placeholder="End Date">

    <!-- SKILLS -->
    <h3>Skills</h3>
    <input id="skills" placeholder="e.g. Java, Python, UI Design">

    <!-- HOBBIES -->
    <h3>Hobbies / Interests</h3>
    <input id="hobbies" placeholder="Reading, Music, Sports">

    <button onclick="generate()">Generate Resume</button>

</div>

<script>
function generate() {

    const data = {
        name: document.getElementById("name").value,
        profile: document.getElementById("profile").value,

        phone: document.getElementById("phone").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value,

        jobTitle: document.getElementById("jobTitle").value,
        company: document.getElementById("company").value,
        expStart: document.getElementById("expStart").value,
        expEnd: document.getElementById("expEnd").value,
        expDesc: document.getElementById("expDesc").value,

        degree: document.getElementById("degree").value,
        college: document.getElementById("college").value,
        eduStart: document.getElementById("eduStart").value,
        eduEnd: document.getElementById("eduEnd").value,

        skills: document.getElementById("skills").value,
        hobbies: document.getElementById("hobbies").value
    };

    localStorage.setItem("resumeData", JSON.stringify(data));
    localStorage.setItem("template", "t3"); // ensure template 3

    window.location.href = "resume.html";
}
</script>

</body>
</html>
